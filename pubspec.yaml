    - android/assets/images/invitation_foryou.png
    - android/assets/images/notification_on.svg
    - android/assets/images/notification_off.svg
    - android/assets/images/notification_group.png
    - android/assets/images/notification_calender.png
    - android/assets/images/notification_invitation.png
    - android/assets/images/dashed_circle.svg
    - android/assets/images/left.svg
    - android/assets/images/right.svg
    - android/assets/images/close.svg
    - android/assets/images/open.svg
    - android/assets/images/dropdown.svg
    - android/assets/omo.mp4
    - android/assets/images/splash.png
    - android/assets/images/cal_month_unselected.svg
