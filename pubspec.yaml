name: ohmo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  drift: ^2.28.1
  drift_flutter: ^0.2.5
  path_provider: ^2.0.0

  sqlite3_flutter_libs: ^0.5.39
  cupertino_icons: ^1.0.8
  table_calendar: 3.0.9
  intl: 0.18.1
  flutter_svg: ^2.0.17
  image_picker: 1.1.2
  provider: ^6.0.0
  expansion_tile_card: ^3.0.0
  uuid: ^4.0.0
  fluttertoast: ^8.2.12
  http: ^1.0.0
  emoji_picker_flutter: ^4.3.0
  flutter_slidable: ^4.0.1
  home_widget: ^0.8.0
  app_links: ^6.4.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  extended_text_field: ^16.0.2
  share_plus: ^12.0.1
  flutter_timezone: ^5.0.1
  connectivity_plus: ^7.0.0
  url_launcher: 6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  drift_dev: ^2.28.1
  build_runner: 2.7.0

flutter:
  assets:
    - android/assets/images/cal_month.svg
    - android/assets/images/cal_week.svg
    - android/assets/images/plus.svg
    - android/assets/images/plus2.svg
    - android/assets/images/routine_alarm.svg
    - android/assets/images/todo_alarm.svg
    - android/assets/images/calendar_unselected.svg
    - android/assets/images/calendar_selected.svg
    - android/assets/images/daylog_unselected.svg
    - android/assets/images/daylog_selected.svg
    - android/assets/images/my_unselected.svg
    - android/assets/images/my_selected.svg
    - android/assets/images/happy_unselected.svg
    - android/assets/images/soso_unselected.svg
    - android/assets/images/bad_unselected.svg
    - android/assets/images/mybackground.svg
    - android/assets/images/myprofile.svg
    - android/assets/images/notion.svg
    - android/assets/images/profile_photo.svg
    - android/assets/images/background_edit.svg
    - android/assets/images/login_google.svg
    - android/assets/images/login_naver.svg
    - android/assets/images/login_kakao.svg
    - android/assets/images/omo.png
    - android/assets/images/setting.svg
    - android/assets/images/clear_ohmo.png
    - android/assets/images/group_sign.png
    - android/assets/images/ohmo_letsgo.png
    - android/assets/images/copy.svg
    - android/assets/images/round_check.svg
    - android/assets/images/invitation.png
    - android/assets/images/invitation_foryou.png
    - android/assets/images/notification_on.svg
    - android/assets/images/notification_off.svg
    - android/assets/images/notification_group.png
    - android/assets/images/notification_calender.png
    - android/assets/images/notification_invitation.png
    - android/assets/images/dashed_circle.svg
    - android/assets/images/left.svg
    - android/assets/images/right.svg
    - android/assets/images/close.svg
    - android/assets/images/open.svg
    - android/assets/images/dropdown.svg

  uses-material-design: true
  fonts:
    - family: RubikSprayPaint
      fonts:
        - asset: android/assets/fonts/RubikSprayPaint-Regular.ttf
    - family: PretendardBold
      fonts:
        - asset: android/assets/fonts/Pretendard-Bold.ttf
    - family: PretendardRegular
      fonts:
        - asset: android/assets/fonts/Pretendard-Regular.ttf
    - family: PretendardSemiBold
      fonts:
        - asset: android/assets/fonts/Pretendard-SemiBold.ttf
    - family: PretendardMedium
      fonts:
        - asset: android/assets/fonts/Pretendard-Medium.otf