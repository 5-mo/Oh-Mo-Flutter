    - android/assets/images/calendar_unselected.svg
    - android/assets/images/calendar_selected.svg
    - android/assets/images/daylog_unselected.svg
    - android/assets/images/daylog_selected.svg
    - android/assets/images/my_unselected.svg
    - android/assets/images/my_selected.svg
    - android/assets/images/happy_unselected.svg
    - android/assets/images/soso_unselected.svg
    - android/assets/images/bad_unselected.svg
    - android/assets/images/mybackground.svg
    - android/assets/images/myprofile.svg
    - android/assets/images/notion.svg
    - android/assets/images/profile_photo.svg
    - android/assets/images/background_edit.svg
    - android/assets/images/login_google.svg
    - android/assets/images/login_naver.svg
