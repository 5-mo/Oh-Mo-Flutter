name: ohmo
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.2+5

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  drift: ^2.28.1
  drift_flutter: ^0.2.5
  path_provider: ^2.0.0

  sqlite3_flutter_libs: ^0.5.39
  cupertino_icons: ^1.0.8
  table_calendar: 3.0.9
  intl: 0.18.1
  flutter_svg: ^2.0.17
  image_picker: 1.1.2
  provider: ^6.0.0
  expansion_tile_card: ^3.0.0
  uuid: ^4.0.0
  fluttertoast: ^8.2.12
  http: ^1.0.0
  emoji_picker_flutter: ^4.3.0
  flutter_slidable: ^4.0.1
  home_widget: ^0.8.0
  app_links: ^6.4.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  extended_text_field: ^16.0.2
  share_plus: ^12.0.1
  flutter_timezone: ^5.0.1
  connectivity_plus: ^7.0.0
  url_launcher: 6.3.2
  video_player: ^2.8.1
  firebase_core: ^4.4.0
  firebase_analytics: ^12.1.2
  firebase_messaging: ^16.1.1
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  drift_dev: ^2.28.1
  build_runner: 2.7.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.13.1
  dio: ^5.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "android/assets/images/ohmo_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "android/assets/images/ohmo_icon.png"

flutter:
  assets:
    - android/assets/images/cal_month.svg
    - android/assets/images/cal_week.svg
    - android/assets/images/plus.svg
    - android/assets/images/plus2.svg
    - android/assets/images/routine_alarm.svg
